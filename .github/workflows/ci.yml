name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Typecheck
        run: npx turbo typecheck

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: .
          additional_files: start.sh
          ignore_paths: node_modules

      - name: Actionlint
        uses: raven-actions/actionlint@v2

  build:
    name: Build dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Build all packages
        run: npx turbo build

  docs:
    name: Docs & spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Spell check
        uses: streetsidesoftware/cspell-action@v8
        with:
          config: cspell.json
          files: "**/*.md"
          strict: true

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          config-file: .github/mlc-config.json
          use-quiet-mode: yes
          folder-path: .
          file-extension: .md

  garden:
    name: Garden lint (packs/registry/prompts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Garden drift + size-cap lint (FRW-BL-067)
        run: node scripts/garden-lint.mjs

      - name: Plugin manifest validation (FRW-BL-041)
        run: node framework/plugin/validate-plugin.mjs

      - name: Plugin validator self-test (FRW-BL-041)
        run: node framework/plugin/validate-plugin.test.mjs
